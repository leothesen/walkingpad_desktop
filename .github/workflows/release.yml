name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            ~/Library/Caches/org.swift.swiftpm
          key: spm-${{ hashFiles('walkingpad-client.xcodeproj/project.pbxproj') }}
          restore-keys: spm-

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set marketing version
        run: |
          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = ${{ steps.version.outputs.version }};/g" \
            walkingpad-client.xcodeproj/project.pbxproj

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme walkingpad-client

      - name: Build (Release)
        run: |
          xcodebuild -scheme walkingpad-client \
            -configuration Release \
            -derivedDataPath build \
            -destination "platform=macOS,arch=arm64" \
            CODE_SIGN_IDENTITY="-" \
            -quiet

      - name: Zip app bundle
        run: |
          cd build/Build/Products/Release
          zip -r ../../../../WalkingPad-Client.zip "Walkingpad Client.app" -q

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        shell: bash
        run: |
          # Download Sparkle tools
          SPARKLE_VERSION="2.6.4"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle
          tar xJf /tmp/sparkle.tar.xz -C /tmp/sparkle

          # Find sign_update binary
          SIGN_UPDATE=$(find /tmp/sparkle -name "sign_update" -type f | head -1)
          echo "Found sign_update at: $SIGN_UPDATE"
          ls -la "$SIGN_UPDATE"

          # Get zip file size and build date
          FILE_SIZE=$(stat -f%z WalkingPad-Client.zip)
          PUB_DATE=$(date -R)
          VERSION="${{ steps.version.outputs.version }}"

          # Write private key to a temp file for sign_update
          KEY_FILE=$(mktemp)
          echo -n "$SPARKLE_PRIVATE_KEY" > "$KEY_FILE"

          # Generate EdDSA signature — sign_update outputs: sparkle:edSignature="<sig>" length="<len>"
          # Extract just the signature value
          chmod +x "$SIGN_UPDATE"
          RAW_OUTPUT=$("$SIGN_UPDATE" WalkingPad-Client.zip -f "$KEY_FILE" 2>&1) || {
            echo "sign_update failed: $RAW_OUTPUT"
            rm -f "$KEY_FILE"
            exit 1
          }
          rm -f "$KEY_FILE"
          SIGNATURE=$(echo "$RAW_OUTPUT" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
          echo "Signature: $SIGNATURE"

          # Generate appcast.xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">\n  <channel>\n    <title>WalkingPad Client</title>\n    <link>https://github.com/leothesen/walkingpad_desktop</link>\n    <item>\n      <title>Version %s</title>\n      <pubDate>%s</pubDate>\n      <sparkle:version>%s</sparkle:version>\n      <sparkle:shortVersionString>%s</sparkle:shortVersionString>\n      <enclosure\n        url="https://github.com/leothesen/walkingpad_desktop/releases/download/v%s/WalkingPad-Client.zip"\n        length="%s"\n        type="application/octet-stream"\n        sparkle:edSignature="%s"\n      />\n    </item>\n  </channel>\n</rss>\n' \
            "$VERSION" "$PUB_DATE" "$VERSION" "$VERSION" "$VERSION" "$FILE_SIZE" "$SIGNATURE" > appcast.xml
          echo "Generated appcast.xml:"
          cat appcast.xml

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" &>/dev/null; then
            # Release already exists (created manually) — upload the asset
            gh release upload "$GITHUB_REF_NAME" WalkingPad-Client.zip --clobber
          else
            # Create new release
            gh release create "$GITHUB_REF_NAME" \
              WalkingPad-Client.zip \
              --title "WalkingPad Client ${{ steps.version.outputs.version }}" \
              --generate-notes
          fi

      - name: Update appcast and version on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save the generated appcast before resetting
          cp appcast.xml /tmp/appcast.xml
          # Reset build-time changes and switch to main
          git checkout -- .
          git fetch origin main
          git checkout main
          # Apply version bump and appcast
          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = ${{ steps.version.outputs.version }};/g" \
            walkingpad-client.xcodeproj/project.pbxproj
          cp /tmp/appcast.xml appcast.xml
          git add appcast.xml walkingpad-client.xcodeproj/project.pbxproj
          git commit -m "chore: update version and appcast for v${{ steps.version.outputs.version }}"
          git push origin main
